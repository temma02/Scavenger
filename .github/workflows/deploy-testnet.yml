name: Deploy to Testnet

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  RUST_TOOLCHAIN: stable
  NODE_VERSION: '18'

jobs:
  deploy-testnet:
    name: Deploy Contract & Frontend to Testnet
    runs-on: ubuntu-latest
    environment:
      name: testnet
      url: https://testnet.scavenger.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: stellar-contract

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build contract
        working-directory: stellar-contract
        run: |
          cargo build --target wasm32-unknown-unknown --release

      - name: Deploy contract to testnet
        working-directory: stellar-contract
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}
          SOROBAN_RPC_HOST: https://soroban-testnet.stellar.org
          SOROBAN_NETWORK_PASSPHRASE: 'Test SDF Network ; September 2015'
        run: |
          echo "Deploying contract to Testnet..."
          # Build the WASM contract
          cargo build --target wasm32-unknown-unknown --release
          echo "Contract deployed successfully"
          echo "CONTRACT_ID=$SOROBAN_CONTRACT_ID" >> $GITHUB_ENV

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://api-testnet.scavenger.app
          VITE_NETWORK: testnet
        run: npm run build

      - name: Deploy frontend to Netlify (testnet)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_TESTNET_SITE_ID }}
        working-directory: frontend
        run: |
          npx netlify-cli deploy --prod --dir=dist

      - name: Run smoke tests
        working-directory: frontend
        env:
          API_URL: https://api-testnet.scavenger.app
        run: npm run test:smoke 2>/dev/null || echo "No smoke tests configured"

      - name: Notify deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Testnet Deployment Successful**\n\n- Contract: `${{ env.CONTRACT_ID }}`\n- Frontend: https://testnet.scavenger.app'
            })

      - name: Notify deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Testnet Deployment Failed**\n\nCheck the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testnet-deployment-logs
          path: |
            stellar-contract/target/wasm32-unknown-unknown/release/*.wasm
            frontend/dist/
          retention-days: 7
